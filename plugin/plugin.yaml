name: qwen-bridge
version: 1.0.0
description: "Bridge between Hermes Agent and Qwen Code — delegate coding tasks to Qwen Code and receive results back for assessment"
author: hermes-qwen-bridge
provides_tools:
  - qwen_task
  - qwen_task_async
  - qwen_task_status
  - qwen_task_result
  - qwen_sessions
  - qwen_check
  - qwen_session_start
  - qwen_session_send
  - qwen_session_read
  - qwen_session_wait
  - qwen_session_stop
  - qwen_session_list
provides_hooks:
  - pre_llm_call
  - on_session_end
